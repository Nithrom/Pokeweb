<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokémon Counter Finder</title>
  <link rel="icon" type="image/svg+xml" href="img/favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Tooltip global para badges de tipo -->
  <div id="mv-global-tooltip"></div>

  <!-- HEADER -->
  <header>
    <h1>⚔ POKÉMON COUNTER FINDER</h1>
    <div class="status-bar" id="status-bar">
      <span class="spinner"></span> Cargando Pokédex...
    </div>
  </header>

  <!-- COLUMNAS PRINCIPALES -->
  <div class="main-cols">

    <!-- ══════════ COLUMNA DEFENSOR ══════════ -->
    <div class="col-def">

      <!-- Cabecera + búsqueda -->
      <div class="col-header">
        <div class="col-title">🛡 ¿QUÉ LE HACE DAÑO?</div>
        <div class="search-wrap">
          <input class="search-input" id="search-def" placeholder="Pokémon defensor..." disabled autocomplete="off">
          <div class="suggestions" id="sug-def"></div>
        </div>
      </div>

      <!-- FILA 1: Pokémon + Movimientos -->
      <div class="row-pokemon">

        <!-- Tarjeta pokémon -->
        <div class="poke-panel">
          <div class="poke-card" id="card-def">
            <img id="img-def" src="" alt="">
            <div class="poke-name" id="name-def"></div>
            <div class="poke-num">N.º <span id="id-def"></span></div>
            <div class="types-row" id="types-def"></div>
          </div>
        </div>

        <!-- Panel de movimientos -->
        <div class="moves-panel" id="moves-section-def" style="display:none;">
          <div class="moves-panel-title">
            <span>MOVIMIENTOS</span>
            <span id="moves-count-def"></span>
          </div>
          <div class="moves-selected-info" id="moves-sel-info-def"></div>
          <input class="moves-filter" id="moves-filter-def" placeholder="Filtrar movimiento..." autocomplete="off">
          <div class="moves-table-wrap">
            <table class="moves-table">
              <colgroup>
                <col class="col-sel"><col class="col-lvl"><col class="col-name">
                <col class="col-type"><col class="col-cat"><col class="col-pow">
              </colgroup>
              <thead>
                <tr>
                  <th class="th-c">✓</th>
                  <th class="th-c">Nv.</th>
                  <th>Movimiento</th>
                  <th>Tipo</th>
                  <th class="th-c">Cat.</th>
                  <th class="th-c">Pot.</th>
                </tr>
              </thead>
              <tbody id="moves-list-def"></tbody>
            </table>
          </div>
        </div>

      </div><!-- /row-pokemon -->

      <!-- FILA 2: Tabla de tipos -->
      <div class="row-types">
        <div class="types-panel">
          <div class="types-panel-title" id="types-title-def">TIPOS QUE LE HACEN DAÑO</div>
          <div class="types-two-cols" id="types-panel-def">
            <div id="output-left-def"></div>
            <div id="output-right-def"></div>
          </div>
        </div>
      </div>

      <!-- FILA 3: Pokémon recomendados -->
      <div class="row-recs">
        <div class="rec-label" id="rec-label-def">COUNTERS RECOMENDADOS</div>
        <div class="rec-grid" id="rec-def"></div>
      </div>

    </div><!-- /col-def -->

    <!-- ══════════ COLUMNA ATACANTE ══════════ -->
    <div class="col-atk">

      <!-- Cabecera + búsqueda -->
      <div class="col-header">
        <div class="col-title">⚔ ¿A QUÉ LE HACE DAÑO?</div>
        <div class="search-wrap">
          <input class="search-input" id="search-atk" placeholder="Pokémon atacante..." disabled autocomplete="off">
          <div class="suggestions" id="sug-atk"></div>
        </div>
      </div>

      <!-- FILA 1: Pokémon + Movimientos -->
      <div class="row-pokemon">

        <!-- Tarjeta pokémon -->
        <div class="poke-panel">
          <div class="poke-card" id="card-atk">
            <img id="img-atk" src="" alt="">
            <div class="poke-name" id="name-atk"></div>
            <div class="poke-num">N.º <span id="id-atk"></span></div>
            <div class="types-row" id="types-atk"></div>
          </div>
        </div>

        <!-- Panel de movimientos -->
        <div class="moves-panel" id="moves-section-atk" style="display:none;">
          <div class="moves-panel-title">
            <span>MOVIMIENTOS</span>
            <span id="moves-count-atk"></span>
          </div>
          <div class="moves-selected-info" id="moves-sel-info-atk"></div>
          <input class="moves-filter" id="moves-filter-atk" placeholder="Filtrar movimiento..." autocomplete="off">
          <div class="moves-table-wrap">
            <table class="moves-table">
              <colgroup>
                <col class="col-sel"><col class="col-lvl"><col class="col-name">
                <col class="col-type"><col class="col-cat"><col class="col-pow">
              </colgroup>
              <thead>
                <tr>
                  <th class="th-c">✓</th>
                  <th class="th-c">Nv.</th>
                  <th>Movimiento</th>
                  <th>Tipo</th>
                  <th class="th-c">Cat.</th>
                  <th class="th-c">Pot.</th>
                </tr>
              </thead>
              <tbody id="moves-list-atk"></tbody>
            </table>
          </div>
        </div>

      </div><!-- /row-pokemon -->

      <!-- FILA 2: Tabla de tipos -->
      <div class="row-types">
        <div class="types-panel">
          <div class="types-panel-title" id="types-title-atk">TIPOS A LOS QUE HACE DAÑO</div>
          <div class="types-two-cols" id="types-panel-atk">
            <div id="output-left-atk"></div>
            <div id="output-right-atk"></div>
          </div>
        </div>
      </div>

      <!-- FILA 3: Pokémon recomendados -->
      <div class="row-recs">
        <div class="rec-label" id="rec-label-atk">POKÉMON DÉBILES</div>
        <div class="rec-grid" id="rec-atk"></div>
      </div>

    </div><!-- /col-atk -->

  </div><!-- /main-cols -->

  <script src="js/app.js"></script>
</body>
</html>
