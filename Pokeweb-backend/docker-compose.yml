version: '3.8'

services:

  # ── Frontend: nginx sirve los HTML/CSS/JS ─────────────────────────────────
  pokeweb:
    image: nginx:alpine
    container_name: pokeweb_frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ../Pokeweb:/usr/share/nginx/html:ro   # carpeta del frontend
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

  # ── Base de datos ─────────────────────────────────────────────────────────
  mariadb:
    image: mariadb:11
    container_name: pokeweb_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: pokeweb_root
      MYSQL_DATABASE: pokeweb
      MYSQL_USER: pokeweb_user
      MYSQL_PASSWORD: pokeweb_pass
    volumes:
      - db_data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── phpMyAdmin ────────────────────────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: pokeweb_phpmyadmin
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      PMA_HOST: mariadb
      PMA_PORT: 3306
      PMA_USER: pokeweb_user
      PMA_PASSWORD: pokeweb_pass
    ports:
      - "8081:80"    # http://localhost:8081

  # ── API Flask ─────────────────────────────────────────────────────────────
  api:
    build: ./api
    container_name: pokeweb_api
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_NAME: pokeweb
      DB_USER: pokeweb_user
      DB_PASS: pokeweb_pass
    ports:
      - "5000:5000"
    volumes:
      - ./api:/app   # hot reload

volumes:
  db_data:
