<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Batalla contra Entrenadores</title>
  <link rel="icon" type="image/png" href="img/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/teams.css">
  <link rel="stylesheet" href="css/trainers.css">
</head>
<body>

<header>
  <div class="nav-placeholder"></div>
  <div class="header-center">
    <h1>BATALLA CONTRA ENTRENADORES</h1>
    <div class="status-bar" id="status-bar"><span class="spinner"></span> Cargando...</div>
  </div>
  <nav class="nav-menu" aria-label="Menú principal">
    <button class="nav-btn" id="nav-btn" aria-label="Abrir menú" aria-expanded="false" aria-controls="nav-dropdown">☰</button>
    <div class="nav-dropdown" id="nav-dropdown" role="menu">
      <a href="index.html" role="menuitem">INICIO</a>
      <a href="teams.html" role="menuitem">BATALLA POR EQUIPOS</a>
      <a href="trainers.html" class="active" role="menuitem" aria-current="page">BATALLA CONTRA ENTRENADORES</a>
    </div>
  </nav>
</header>

<!-- Selector de entrenador -->
<div class="trainer-selector-bar" id="trainer-selector-bar">
  <div class="selector-inner">
    <div class="selector-row selector-row-filters">
      <div class="selector-group">
        <label class="selector-label" for="sel-game">Juego</label>
        <select id="sel-game" class="sel-dropdown" disabled aria-label="Seleccionar juego">
          <option value="">— Juego —</option>
        </select>
      </div>
      <div class="selector-arrow" aria-hidden="true">▶</div>
      <div class="selector-group" id="sel-starter-group">
        <label class="selector-label" for="sel-starter">Inicial</label>
        <select id="sel-starter" class="sel-dropdown" disabled aria-label="Seleccionar tu Pokémon inicial">
          <option value="">— Inicial —</option>
        </select>
      </div>
      <div class="selector-arrow" aria-hidden="true">▶</div>
      <div class="selector-group">
        <label class="selector-label" for="sel-trainer">Entrenador</label>
        <select id="sel-trainer" class="sel-dropdown" disabled aria-label="Seleccionar entrenador">
          <option value="">— Entrenador —</option>
        </select>
      </div>
      <div class="selector-arrow" id="arrow-before-rematch" hidden aria-hidden="true">▶</div>
      <div class="selector-group" id="sel-rematch-group" hidden>
        <label class="selector-label" for="sel-rematch">Revancha</label>
        <select id="sel-rematch" class="sel-dropdown" disabled aria-label="Seleccionar batalla o revancha">
          <option value="first">Primera batalla</option>
          <option value="rematch">Revancha</option>
        </select>
      </div>
      <div class="selector-arrow" id="arrow-before-difficulty" hidden aria-hidden="true">▶</div>
      <div class="selector-group" id="sel-difficulty-group" hidden>
        <label class="selector-label" for="sel-difficulty">Dificultad</label>
        <select id="sel-difficulty" class="sel-dropdown" disabled aria-label="Seleccionar dificultad del juego">
          <option value="normal">Normal / Fácil</option>
          <option value="challenge">Difícil</option>
        </select>
      </div>
    </div>
    <div class="selector-row selector-row-action">
      <button class="btn-load-trainer" id="btn-load-trainer" disabled onclick="loadTrainer()" aria-label="Añadir equipo del entrenador">
        Añadir equipo
      </button>
    </div>
  </div>
</div>

<main class="teams-layout">

  <!-- MI EQUIPO (A) -->
  <section class="team-col team-a" aria-label="Mi equipo">
    <div class="team-header">
      <div class="team-title-row">
        <label for="team-name-a" class="sr-only">Nombre de mi equipo</label>
        <input class="team-name-input" id="team-name-a" value="Mi Equipo" maxlength="24" aria-label="Nombre de mi equipo">
        <button class="btn-clear-team" onclick="clearTeam('a')" aria-label="Limpiar mi equipo">✕ Limpiar</button>
      </div>
    </div>
    <div class="team-slots" id="slots-a" role="list" aria-label="Slots de mi equipo"></div>
  </section>

  <!-- VS -->
  <div class="vs-center">
    <button class="btn-vs" onclick="analyzeBattle()" title="Analizar batalla" aria-label="Analizar batalla">VS</button>
  </div>

  <!-- EQUIPO RIVAL (B) -->
  <section class="team-col team-b" aria-label="Equipo rival">
    <div class="team-header">
      <div class="team-title-row trainer-b-header" id="trainer-b-header">
        <div class="trainer-b-info" id="trainer-b-info">
          <span class="trainer-b-name" id="trainer-b-name">Rival</span>
          <span class="trainer-b-game" id="trainer-b-game"></span>
        </div>
        <button class="btn-clear-team" onclick="clearTrainer()" aria-label="Limpiar equipo rival">✕ Limpiar</button>
      </div>
    </div>
    <div class="team-slots" id="slots-b" role="list" aria-label="Slots del equipo rival"></div>
  </section>

</main>

<!-- MODAL: búsqueda pokémon (solo equipo A) -->
<div class="modal-overlay" id="modal-poke-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-poke-title">
  <div class="modal-poke-box" id="modal-poke-box">
    <div class="modal-poke-head">
      <div class="modal-poke-title" id="modal-poke-title">ELIGE UN POKÉMON</div>
      <button class="modal-close-btn" onclick="closePokeModal()" aria-label="Cerrar modal">✕</button>
    </div>
    <div class="modal-filters" role="search" aria-label="Filtros de búsqueda">
      <div class="filter-row">
        <input class="modal-name-input" id="modal-name-filter" placeholder="Buscar por nombre..." autocomplete="off" aria-label="Buscar pokémon por nombre">
        <span class="modal-result-count" id="modal-result-count" aria-live="polite" aria-atomic="true"></span>
      </div>
      <div class="filter-row" id="type-filter-row" role="group" aria-label="Filtrar por tipo"></div>
      <div class="filter-row" role="group" aria-label="Filtros adicionales">
        <span class="filter-label">Filtros:</span>
        <button class="filter-toggle-btn" id="filter-legendary" onclick="toggleFilter('legendary')" aria-pressed="false">⭐ Legendario</button>
        <button class="filter-toggle-btn" id="filter-physical"  onclick="toggleFilter('physical')" aria-pressed="false">⚔ Físico</button>
        <button class="filter-toggle-btn" id="filter-special"   onclick="toggleFilter('special')" aria-pressed="false">✦ Especial</button>
      </div>
    </div>
    <div class="modal-poke-grid" id="modal-poke-grid" role="list" aria-label="Lista de pokémon"></div>
    <div class="modal-load-more" id="modal-load-more-wrap">
      <button class="btn-load-more" onclick="loadMorePokemon()" aria-label="Ver más pokémon">Ver más</button>
    </div>
  </div>
</div>

<!-- MODAL: moves -->
<div class="modal-moves-overlay" id="modal-moves-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-moves-title">
  <div class="modal-moves-box" id="modal-moves-box">
    <div class="modal-moves-head">
      <div>
        <div class="modal-moves-title" id="modal-moves-title">MOVIMIENTOS</div>
        <div class="modal-moves-sub">Selecciona hasta 4 movimientos</div>
      </div>
      <button class="modal-close-btn" onclick="closeMovesModal()" aria-label="Cerrar sin guardar">✕</button>
    </div>
    <div class="modal-moves-filter-row">
      <input type="text" id="modal-moves-filter-input" placeholder="Filtrar..." autocomplete="off" aria-label="Filtrar movimientos">
    </div>
    <div class="modal-moves-count-bar" aria-live="polite">Seleccionados: <span id="modal-moves-count">0</span>/4</div>
    <div class="modal-moves-table-wrap" role="region" aria-label="Tabla de movimientos">
      <table class="modal-moves-table" id="modal-moves-table" aria-label="Movimientos disponibles">
        <colgroup>
          <col class="mc-chk"><col class="mc-name"><col class="mc-type">
          <col class="mc-cat"><col class="mc-pow"><col class="mc-acc">
        </colgroup>
        <thead>
          <tr>
            <th scope="col" aria-label="Seleccionado">✓</th>
            <th scope="col" data-sort="name">Movimiento <span class="sort-arrow-m" aria-hidden="true">↕</span></th>
            <th scope="col" data-sort="type">Tipo <span class="sort-arrow-m" aria-hidden="true">↕</span></th>
            <th scope="col" data-sort="cat">Categoría <span class="sort-arrow-m" aria-hidden="true">↕</span></th>
            <th scope="col" data-sort="pow">Potencia <span class="sort-arrow-m" aria-hidden="true">↕</span></th>
            <th scope="col" data-sort="acc">Precisión <span class="sort-arrow-m" aria-hidden="true">↕</span></th>
          </tr>
        </thead>
        <tbody id="modal-moves-tbody"></tbody>
      </table>
    </div>
    <div class="modal-moves-footer">
      <button class="btn-cancel" onclick="closeMovesModal()">Cancelar</button>
      <button class="btn-confirm-moves" id="btn-confirm-moves" onclick="confirmMoves()">Confirmar</button>
    </div>
  </div>
</div>

<!-- MODAL: análisis -->
<div class="modal-analysis-overlay" id="modal-analysis-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-analysis-title">
  <div class="modal-analysis-box">
    <div class="modal-analysis-head">
      <div class="modal-analysis-title" id="modal-analysis-title">⚡ ANÁLISIS DE BATALLA</div>
      <button class="modal-close-btn" onclick="closeAnalysisModal()" aria-label="Cerrar análisis">✕</button>
    </div>
    <div class="modal-analysis-body" id="modal-analysis-body"></div>
  </div>
</div>

<!-- OVERLAY: swap recomendado -->
<div id="swap-overlay" role="dialog" aria-modal="true" aria-labelledby="swap-title">
  <div class="swap-box">
    <div class="swap-title" id="swap-title">¿QUÉ POKÉMON CAMBIAS?</div>
    <div class="swap-grid" id="swap-grid" role="list" aria-label="Pokémon del equipo"></div>
    <button class="swap-cancel" onclick="closeSwapOverlay()" aria-label="Cancelar cambio">Cancelar</button>
  </div>
</div>

<style>.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}</style>

<script src="js/teams.js"></script>
<script src="js/trainers.js"></script>
</body>
</html>
