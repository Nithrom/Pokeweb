<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokémon Battle Teams</title>
  <link rel="icon" type="image/png" href="img/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/teams.css">
</head>
<body>

  <!-- Tooltip global -->
  <div id="mv-global-tooltip" style="display:none;position:fixed;z-index:9999;background:#1a1a2e;border:1px solid #4a9eff;border-radius:8px;padding:8px 12px;font-size:.65rem;font-weight:700;line-height:1.9;color:#eaeaea;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.7);white-space:nowrap;"></div>

  <!-- HEADER -->
  <header>
    <div class="header-inner">
      <h1>⚔ POKÉMON BATTLE TEAMS</h1>
      <nav class="nav-menu">
        <a href="index.html" class="nav-link">🔍 Counter Finder</a>
        <a href="teams.html" class="nav-link active">⚔ Battle Teams</a>
      </nav>
    </div>
    <div class="status-bar" id="status-bar">
      <span class="spinner"></span> Cargando Pokédex...
    </div>
  </header>

  <!-- BOTÓN ANALIZAR (fijo centrado) -->
  <div class="analyze-bar">
    <button class="analyze-btn" id="analyze-btn" onclick="analyzeTeams()">
      ⚡ ANALIZAR EQUIPOS
    </button>
  </div>

  <!-- COLUMNAS PRINCIPALES -->
  <div class="teams-cols">

    <!-- ══════ EQUIPO A ══════ -->
    <div class="team-col" id="col-a">
      <div class="team-header">
        <div class="team-title t-a">🔵 EQUIPO A</div>
      </div>

      <!-- 6 slots -->
      <div class="slots-list" id="slots-a">
        <!-- generado por JS -->
      </div>

      <!-- Dashboard análisis A -->
      <div class="analysis-panel" id="analysis-a" style="display:none">
        <div class="analysis-summary" id="summary-a"></div>
        <div class="matchup-table-wrap" id="matchup-a"></div>
      </div>
    </div>

    <!-- ══════ EQUIPO B ══════ -->
    <div class="team-col" id="col-b">
      <div class="team-header">
        <div class="team-title t-b">🔴 EQUIPO B</div>
      </div>

      <div class="slots-list" id="slots-b">
        <!-- generado por JS -->
      </div>

      <!-- Dashboard análisis B -->
      <div class="analysis-panel" id="analysis-b" style="display:none">
        <div class="analysis-summary" id="summary-b"></div>
        <div class="matchup-table-wrap" id="matchup-b"></div>
      </div>
    </div>

  </div><!-- /teams-cols -->

  <!-- MODAL DE BÚSQUEDA -->
  <div class="modal-overlay" id="modal-overlay" style="display:none" onclick="closeModal(event)">
    <div class="modal-box">
      <div class="modal-header">
        <div class="modal-title" id="modal-title">ELIGE EL POKÉMON</div>
        <button class="modal-close" onclick="closeModalBtn()">✕</button>
      </div>

      <!-- Filtros -->
      <div class="modal-filters">
        <input class="modal-search-input" id="modal-search" placeholder="Buscar por nombre..." autocomplete="off">
        <div class="modal-filter-row">
          <!-- Tipos (hasta 2) -->
          <div class="filter-group">
            <span class="filter-label">TIPO</span>
            <div class="type-filter-grid" id="type-filter-grid"></div>
          </div>
          <!-- Legendario -->
          <div class="filter-group">
            <span class="filter-label">CATEGORÍA</span>
            <div class="btn-filter-group" id="legend-filter">
              <button class="filter-btn active" data-val="all">Todos</button>
              <button class="filter-btn" data-val="legendary">Legendario</button>
              <button class="filter-btn" data-val="normal">Normal</button>
            </div>
          </div>
          <!-- Estilo de daño -->
          <div class="filter-group">
            <span class="filter-label">ESTILO</span>
            <div class="btn-filter-group" id="style-filter">
              <button class="filter-btn active" data-val="all">Todos</button>
              <button class="filter-btn" data-val="physical">Físico</button>
              <button class="filter-btn" data-val="special">Especial</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Grid de pokémon -->
      <div class="modal-grid" id="modal-grid"></div>
      <div class="modal-load-more" id="modal-load-more" style="display:none">
        <button class="load-more-btn" onclick="loadMoreModal()">Ver más</button>
      </div>
    </div>
  </div>

  <!-- MODAL MOVES -->
  <div class="modal-overlay" id="moves-modal-overlay" style="display:none" onclick="closeMovesModal(event)">
    <div class="modal-box modal-box-moves">
      <div class="modal-header">
        <div class="modal-title" id="moves-modal-title">EDITAR MOVES</div>
        <button class="modal-close" onclick="closeMovesModalBtn()">✕</button>
      </div>
      <div class="moves-modal-info">Selecciona hasta 4 movimientos ofensivos</div>
      <input class="modal-search-input" id="moves-modal-search" placeholder="Filtrar movimiento..." autocomplete="off">
      <div class="moves-modal-table-wrap">
        <table class="moves-modal-table">
          <thead>
            <tr>
              <th>✓</th>
              <th>Movimiento</th>
              <th>Tipo</th>
              <th>Cat.</th>
              <th>Pot.</th>
              <th>Prec.</th>
            </tr>
          </thead>
          <tbody id="moves-modal-body"></tbody>
        </table>
      </div>
      <div class="moves-modal-footer">
        <button class="moves-modal-ok" onclick="closeMovesModalBtn()">✓ CONFIRMAR</button>
      </div>
    </div>
  </div>

  <script src="js/teams.js"></script>
</body>
</html>
